name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://healthmadeclear.org
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run content:bundle
      - run: npm run content:validate
      - run: git diff --exit-code
      - run: npm run format:check
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      # Supabase env scoped to build only — Playwright dev server must use mock auth for e2e
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci-build.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_build_anon_key_placeholder
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
