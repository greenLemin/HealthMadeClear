version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
      playwright:
        patterns:
          - "@playwright/*"
